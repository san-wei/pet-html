<form id="bookingForm">
  姓名：<input type="text" id="name" required><br>
  日期：<input type="date" id="date" required><br>
  時間：<input type="time" id="time" required><br>
  <button type="button" onclick="submitBooking()">提交預約</button>
</form>

<script>
function submitBooking() {
  const data = {
    name: document.getElementById('name').value,
    date: document.getElementById('date').value,
    time: document.getElementById('time').value
  };

  fetch('https://script.google.com/macros/s/AKfycbw1w1VYlTOxO30rNr8k6TEVy7MTLrf_BUmUQApefmHbe7s8Ovevhgst5lG2SmFkMEgOvA/exec', {
    method: 'POST',
    mode: 'no-cors', // 加入這行繞過 CORS 限制
    body: JSON.stringify(data),
    headers: {
      'Content-Type': 'text/plain' // 這裡改用 text/plain 避免被 GAS 阻擋
    }
  })
  .then(() => {
    alert('預約已送出！請檢查日曆。');
    liff.closeWindow(); // 如果是在 LIFF 內，送出後自動關閉
  })
  .catch(err => console.error('錯誤:', err));
}
</script>
